<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday My Love</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top left, #ffb6c1, #8b008b);
      height: 100%;
      color: #fff;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 30px 20px;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(255, 20, 147, 0.4);
      max-width: 500px;
      width: 100%;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 2em;
      text-shadow: 0 0 15px #ff69b4;
      animation: glow 2s infinite alternate;
      margin-bottom: 10px;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #ff1493; }
      to { text-shadow: 0 0 25px #ff69b4; }
    }

    .subtitle {
      font-size: 1em;
      margin-bottom: 20px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 20px;
    }

    .classic-btn {
      background: linear-gradient(to right, #ff69b4, #ff1493);
      border: none;
      color: #fff;
      padding: 12px;
      border-radius: 50px;
      font-size: 1em;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
      width: 100%;
    }

    .classic-btn:active {
      transform: scale(0.98);
    }

    #message-box {
      margin-top: 20px;
      font-size: 1.2em;
      animation: fadeIn 0.5s ease-in-out;
      min-height: 40px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Floating Hearts */
    .heart {
      position: fixed;
      width: 16px;
      height: 16px;
      background: red;
      transform: rotate(45deg);
      animation: float 10s linear infinite;
      z-index: 1;
    }

    .heart::before, .heart::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      background: red;
      border-radius: 50%;
    }

    .heart::before {
      top: -8px;
      left: 0;
    }

    .heart::after {
      left: -8px;
      top: 0;
    }

    @keyframes float {
      0% {
        bottom: -50px;
        opacity: 0;
        transform: translateX(0) rotate(45deg);
      }
      50% {
        opacity: 1;
      }
      100% {
        bottom: 110%;
        transform: translateX(80px) rotate(45deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Happy Birthday, My Love!</h1>
    <p class="subtitle">You light up my life every single day. Today, we celebrate you.</p>
    
    <div class="button-group">
      <button class="classic-btn" onclick="showMessage('You are the reason my heart beats with joy.')">Love Note</button>
      <button class="classic-btn" onclick="showMessage('Every moment with you is a blessing.')">Future Together</button>
      <button class="classic-btn" onclick="showMessage('To my queen—may your day be as beautiful as your soul.')">My Queen</button>
    </div>
    
    <div id="message-box"></div>
  </div>

  <!-- Floating hearts -->
  <script>
    function showMessage(message) {
      const box = document.getElementById('message-box');
      box.textContent = message;
      box.style.animation = 'none';
      void box.offsetWidth;
      box.style.animation = 'fadeIn 0.5s ease-in-out';
    }

    // Generate hearts
    for (let i = 0; i < 20; i++) {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.style.left = `${Math.random() * 100}vw`;
      heart.style.animationDuration = `${5 + Math.random() * 5}s`;
      document.body.appendChild(heart);
    }
  </script>
</body>
</html>
